name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

   - name: Inject secret URL
        env:
          PA_URL: ${{ secrets.POWER_AUTOMATE_URL }}
        run: |
          python3 -c "
          with open('M365.html', 'r') as f:
              content = f.read()
          import os
          content = content.replace('POWER_AUTOMATE_URL_PLACEHOLDER', os.environ['PA_URL'])
          with open('M365.html', 'w') as f:
              f.write(content)
          print('Done - replaced URL')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
